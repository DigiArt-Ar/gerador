<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel DigiArt AR - Central</title>
    <style>
        :root { --azul: #0047AB; --claro: #00BFFF; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--azul); margin-bottom: 5px; font-size: 24px; }
        h1 span { color: var(--claro); }
        .instrucao { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .campo-grupo { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--azul); }
        
        .btn { width: 100%; padding: 15px; background: var(--azul); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--claro); transform: translateY(-2px); }
        
        #area-qr { margin-top: 25px; padding: 20px; background: #fafafa; border: 2px dashed #ccc; border-radius: 15px; min-height: 200px; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 100%; height: auto !important; border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .setor-botoes { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-mini { padding: 10px; font-size: 12px; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>DigiArt <span>AR</span></h1>
    <p class="instrucao">Gerador de QR Code Offline</p>

    <div class="campo-grupo">
        <input type="text" id="link" placeholder="Cole o link do seu projeto aqui...">
    </div>
    
    <button class="btn" onclick="gerar()">GERAR QR CODE ✨</button>

    <div id="area-qr">
        <canvas id="canvas"></canvas>
    </div>

    <p id="msg" style="display:none; color: green; font-weight: bold; margin-top: 10px;">QR Gerado! Clique com o botão direito para salvar.</p>

    <div class="setor-botoes">
        <div class="btn-mini" style="background:#E91E63">Cofre Rosa</div>
        <div class="btn-mini" style="background:#0047AB">Cofre Azul</div>
        <div class="btn-mini" style="background:#2E7D32">Cofre Verde</div>
        <div class="btn-mini" style="background:#444">Compilar .MIND</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

<script>
    function gerar() {
        const link = document.getElementById('link').value;
        if(!link) { alert("Cole o link primeiro!"); return; }

        // Se a biblioteca falhar ao carregar por falta de internet, avisamos
        if (typeof QRious === 'undefined') {
            alert("Erro: O navegador bloqueou o gerador. Tente conectar à internet apenas uma vez para carregar ou use um navegador diferente.");
            return;
        }

        new QRious({
            element: document.getElementById('canvas'),
            value: link,
            size: 250,
            level: 'H'
        });
        
        document.getElementById('msg').style.display = 'block';
    }
</script>

</body>
</html>
