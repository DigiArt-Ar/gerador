<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofre DigiArt AR - Painel de Controle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --azul-digiart: #0047AB;
            --azul-claro: #00BFFF;
            --dark: #1a1a1a;
            --branco: #ffffff;
            --cinza: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cinza);
            margin: 0;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--branco);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--azul-digiart);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        header h1 { color: var(--azul-digiart); margin: 0; font-size: 28px; }
        header span { color: var(--azul-claro); font-weight: bold; }

        .secao {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        h3 { color: var(--azul-digiart); margin-top: 0; border-left: 4px solid var(--azul-claro); padding-left: 10px; }
