<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador DigiArt AR - Sincronização e Renovação</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #002171; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; padding: 20px; }
        .card { background: white; color: #333; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 450px; margin-bottom: 20px; }
        h1 { color: #0d47a1; margin-bottom: 5px; font-size: 24px; font-weight: 800; }
        h2 { color: #ffca28; font-size: 12px; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .campo { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 13px; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; }
        .btn-gerar { background: #2e7d32; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-renovar { background: #0288d1; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        #status-msg, #status-renova { margin-top: 10px; font-size: 13px; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>DIGIART AR</h1>
    <h2>Gerador de Novos Tokens</h2>
    <div class="campo">
        <label>Nome do Cliente:</label>
        <input type="text" id="cliente" placeholder="Ex: João Silva">
    </div>
    <div class="campo">
        <label>Quantidade:</label>
        <input type="number" id="qtd" value="1" min="1">
    </div>
    <button class="btn-gerar" onclick="gerarTudoDiretoNoFirebase()">GERAR E SALVAR (SOMA)</button>
    <div id="status-msg"></div>
</div>

<div class="card" style="border-top: 5px solid #0288d1;">
    <h1>RENOVAÇÃO</h1>
    <h2>Extender Prazo de Acesso</h2>
    <div class="campo">
        <label>Token do Cliente (ex: a1234b):</label>
        <input type="text" id="tokenRenovar" placeholder="Cole o token aqui">
    </div>
    <button class="btn-renovar" onclick="renovarToken()">RENOVAR POR +1 ANO ✨</button>
    <div id="status-renova"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDG-0ErUD35BZTHb9RZ21fFnXcMkX-IlZY",
    authDomain: "digiart-ar-sistema.firebaseapp.com",
    databaseURL: "https://digiart-ar-sistema-default-rtdb.firebaseio.com",
    projectId: "digiart-ar-sistema",
    storageBucket: "digiart-ar-sistema.firebasestorage.app",
    messagingSenderId: "497522538079",
    appId: "1:497522538079:web:6ee88681098324dc28cdea"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

function criarTokenPadrao() {
    const letras = 'abcdefghijklmnopqrstuvwxyz';
    const numeros = '0123456789';
    const l1 = letras.charAt(Math.floor(Math.random() * letras.length));
    const l2 = letras.charAt(Math.floor(Math.random() * letras.length));
    let n = ''; for (let i = 0; i < 4; i++) { n += numeros.charAt(Math.floor(Math.random() * numeros.length)); }
    return (l1 + n + l2).toLowerCase();
}

async function gerarTudoDiretoNoFirebase() {
    const cliente = document.getElementById('cliente').value.trim() || "Geral";
    const qtd = parseInt(document.getElementById('qtd').value);
    const statusMsg = document.getElementById('status-msg');
    const tokensFirebase = {};
    const dadosExcel = [];
    const dataAtual = new Date().toLocaleDateString('pt-BR');

    for (let i = 1; i <= qtd; i++) {
        const oToken = criarTokenPadrao();
        tokensFirebase[oToken] = { cliente: cliente, status: "disponivel", data_geracao: dataAtual };
        dadosExcel.push({ "TOKEN": oToken, "CLIENTE": cliente, "DATA": dataAtual });
    }

    try {
        await database.ref('tokens').update(tokensFirebase);
        const ws = XLSX.utils.json_to_sheet(dadosExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Tokens");
        XLSX.writeFile(wb, "Tokens_" + cliente + ".xlsx");
        statusMsg.style.color = "green";
        statusMsg.innerText = "✅ " + qtd + " tokens salvos!";
    } catch (e) { statusMsg.innerText = "❌ Erro"; }
}

async function renovarToken() {
    const token = document.getElementById('tokenRenovar').value.trim().toLowerCase();
    const statusRenova = document.getElementById('status-renova');
    if (!token) return alert("Digite um token!");

    try {
        const ref = database.ref('tokens/' + token);
        const snapshot = await ref.once('value');
        
        if (snapshot.exists()) {
            await ref.update({
                status: "disponivel", // Volta a ficar disponível para o primeiro uso do novo ciclo
                data_ativacao: null,   // Reseta a ativação antiga
                data_renovacao: new Date().toLocaleDateString('pt-BR')
            });
            statusRenova.style.color = "#0288d1";
            statusRenova.innerText = "🚀 Token " + token + " renovado com sucesso!";
            document.getElementById('tokenRenovar').value = "";
        } else {
            statusRenova.style.color = "red";
            statusRenova.innerText = "❌ Token não encontrado!";
        }
    } catch (e) { statusRenova.innerText = "⚠️ Erro na renovação."; }
}
</script>
</body>
</html>
