<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão - DigiArt AR</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --azul-escuro: #1A3C5E; --azul-claro: #4F93BF; 
            --dourado: #FFD700; --dourado-escuro: #B8860B; --fundo: #E6F0F5; 
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fundo); padding: 20px; color: #333; }
        h1 { text-align: center; color: var(--azul-escuro); font-weight: 800; }
        .dashboard-container { display: flex; flex-wrap: wrap; gap: 25px; justify-content: center; max-width: 1400px; margin: 0 auto; }
        .card-sistema {
            background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 15px 35px rgba(26, 60, 94, 0.15); 
            border-top: 8px solid var(--azul-escuro); flex: 1 1 350px; min-width: 320px; box-sizing: border-box;
        }
        .card-sistema h2 { font-size: 1.5rem; color: var(--azul-escuro); border-bottom: 3px solid var(--dourado); padding-bottom: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 2px solid #D1E1EB; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gerar { background-color: var(--dourado); color: var(--azul-escuro); }
        .btn-renovar { background-color: var(--azul-claro); color: white; }
        .btn-qr { background-color: #000; color: white; }
        #resultado-qr { margin-top: 20px; padding: 15px; background: #fafafa; border-radius: 10px; border: 2px dashed #ccc; display: none; text-align: center; }
        #qrcode-view { display: flex; justify-content: center; margin-bottom: 15px; }
        .btn-down { background-color: #27ae60; color: white; font-size: 0.8rem; padding: 10px; }
    </style>
</head>
<body>

    <h1>💎 Painel de Controle DigiArt</h1>

    <div class="dashboard-container">
        <section class="card-sistema">
            <h2>🆕 Criar Novo Lote</h2>
            <input type="text" id="pastaNome" placeholder="Nome da Pasta (Cliente)">
            <input type="number" id="qtdTokens" value="50">
            <button class="btn-gerar" onclick="gerarTokens()">Gerar Tokens e Sincronizar</button>
        </section>

        <section class="card-sistema">
            <h2>⏳ Renovar Acesso</h2>
            <input type="text" id="tokenRenovar" placeholder="Digite o token">
            <input type="number" id="validadeDias" value="365">
            <button class="btn-renovar" onclick="renovarToken()">Confirmar Renovação</button>
        </section>

        <section class="card-sistema">
            <h2>📱 Gerador de QR Code</h2>
            <input type="text" id="urlInput" placeholder="Link do GitHub...">
            <button class="btn-qr" onclick="gerarEVisualizarQR()">Gerar QR Code ✨</button>
            <div id="resultado-qr">
                <div id="qrcode-view"></div>
                <button class="btn-down" onclick="downloadPNG()">📥 BAIXAR QR (PNG)</button>
            </div>
        </section>
    </div>

    <script>
        // CONFIGURAÇÃO DO FIREBASE (Recuperei das nossas conversas)
        const firebaseConfig = {
            apiKey: "AIzaSyC...", // Use suas chaves aqui
            authDomain: "digiart-ar.firebaseapp.com",
            databaseURL: "https://digiart-ar-default-rtdb.firebaseio.com",
            projectId: "digiart-ar",
            storageBucket: "digiart-ar.appspot.com",
            messagingSenderId: "338865612260",
            appId: "1:338865612260:web:..." 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // FUNÇÃO DE GERAR TOKENS (Sua original com Excel + Firebase)
        function gerarTokens() {
            const pasta = document.getElementById('pastaNome').value;
            const qtd = parseInt(document.getElementById('qtdTokens').value);
            if (!pasta) { alert("Nome da pasta obrigatório!"); return; }

            const tokensGerados = [];
            const dataAtual = new Date().toISOString();

            for (let i = 0; i < qtd; i++) {
                const token = Math.random().toString(36).substr(2, 6).toUpperCase();
                tokensGerados.push({ Token: token, Pasta: pasta, Data: dataAtual });
                
                // Grava no Firebase (Isso vai recriar a pasta tokens que você apagou)
                database.ref('tokens/' + token).set({
                    pasta: pasta,
                    validade: 365,
                    status: "ativo"
                });
            }

            // Gera o Excel automaticamente
            const ws = XLSX.utils.json_to_sheet(tokensGerados);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Tokens");
            XLSX.writeFile(wb, `Lote_${pasta}.xlsx`);
            alert("Sucesso! Excel baixado e Firebase atualizado.");
        }

        // FUNÇÃO DE RENOVAÇÃO
        function renovarToken() {
            const token = document.getElementById('tokenRenovar').value;
            const dias = document.getElementById('validadeDias').value;
            if (!token) return;
            database.ref('tokens/' + token).update({ validade: parseInt(dias) });
            alert("Acesso renovado para o token: " + token);
        }

        // FUNÇÕES DO QR CODE
        function gerarEVisualizarQR() {
            const link = document.getElementById("urlInput").value;
            const view = document.getElementById("qrcode-view");
            if(!link) return;
            view.innerHTML = "";
            document.getElementById("resultado-qr").style.display = "block";
            new QRCode(view, { text: link, width: 200, height: 200, colorDark: "#000" });
        }

        function downloadPNG() {
            const canvas = document.querySelector("#qrcode-view canvas");
            const link = document.createElement('a');
            link.download = 'qrcode-digiart.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
