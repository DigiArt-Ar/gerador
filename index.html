<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão DigiArt AR</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --azul: #1A3C5E; --dourado: #FFD700; --fundo: #E6F0F5; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fundo); margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: var(--azul); margin-bottom: 30px; font-weight: 800; }

        .dashboard-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1200px; margin: 0 auto; }

        .card-sistema {
            background: #fff; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 6px solid var(--azul); flex: 1 1 450px; min-width: 300px; box-sizing: border-box;
        }

        .card-sistema h2 { margin-top: 0; font-size: 1.5rem; color: var(--azul); border-bottom: 2px solid var(--dourado); padding-bottom: 10px; margin-bottom: 20px; }
        .campo-grupo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: var(--azul); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }

        .btn-gerar { background-color: var(--dourado); color: var(--azul); }
        .btn-renovar { background-color: var(--azul); color: white; }

        #status { position: fixed; bottom: 20px; right: 20px; padding: 15px; border-radius: 8px; color: white; display: none; z-index: 100; font-weight: bold; }

        @media (max-width: 600px) { .card-sistema { flex: 1 1 100%; } h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <div id="status"></div>
    <h1>💎 Painel de Controle DigiArt AR</h1>

    <div class="dashboard-container">
        
        <section class="card-sistema">
            <h2>🆕 Gerar Novo Lote</h2>
            <div class="campo-grupo">
                <label>Nome do Cliente (Para o registro):</label>
                <input type="text" id="pastaNome" placeholder="ex: cliente-premium">
            </div>
            <div class="campo-grupo">
                <label>Quantidade de Tokens:</label>
                <input type="number" id="qtdTokens" value="50">
            </div>
            <button class="btn-gerar" onclick="gerarTokens()">Gerar e Somar no Banco</button>
        </section>

        <section class="card-sistema">
            <h2>⏳ Renovação de Acesso</h2>
            <div class="campo-grupo">
                <label>Token para Renovar:</label>
                <input type="text" id="tokenRenovar" placeholder="Ex: a1b2c3">
            </div>
            <div class="campo-grupo">
                <label>Dias de Validade:</label>
                <input type="number" id="validadeDias" value="365">
            </div>
            <button class="btn-renovar" onclick="renovarToken()">Confirmar Renovação</button>
        </section>

    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE (Substitua pelos seus dados reais)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            databaseURL: "SUA_DATABASE_URL",
            projectId: "SEU_PROJECT_ID",
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function mostrarMsg(texto, cor) {
            const s = document.getElementById('status');
            s.innerText = texto; s.style.backgroundColor = cor;
            s.style.display = 'block';
            setTimeout(() => s.style.display = 'none', 4000);
        }

        // FUNÇÃO GERAR: Usa .update() para somar na pasta 'tokens'
        function gerarTokens() {
            const pastaInfo = document.getElementById('pastaNome').value.trim();
            const qtd = parseInt(document.getElementById('qtdTokens').value);

            if (!pastaInfo) return mostrarMsg("Digite o nome do cliente!", "#e74c3c");

            const refGeral = database.ref('tokens'); // Pasta raiz que você criou
            let novosTokens = {};

            for (let i = 0; i < qtd; i++) {
                const tokenID = Math.random().toString(36).substring(2, 8);
                novosTokens[tokenID] = {
                    pasta: pastaInfo,
                    status: "disponível",
                    data_criacao: new Date().toLocaleDateString()
                };
            }

            // O segredo da SOMA: update injeta sem apagar o que já existe
            refGeral.update(novosTokens)
                .then(() => mostrarMsg(`${qtd} tokens somados com sucesso!`, "#27ae60"))
                .catch(e => mostrarMsg("Erro: " + e, "#e74c3c"));
        }

        // FUNÇÃO RENOVAR: Busca o token dentro da pasta 'tokens'
        function renovarToken() {
            const token = document.getElementById('tokenRenovar').value.trim();
            const dias = document.getElementById('validadeDias').value;

            if (!token) return mostrarMsg("Digite o token!", "#e74c3c");

            const refToken = database.ref('tokens/' + token);

            refToken.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    refToken.update({
                        status: "disponível",
                        validade: dias + " dias",
                        renovado_em: new Date().toLocaleDateString()
                    })
                    .then(() => mostrarMsg("Token renovado com sucesso!", "#27ae60"))
                    .catch(() => mostrarMsg("Erro na renovação!", "#e74c3c"));
                } else {
                    mostrarMsg("Token não encontrado!", "#e74c3c");
                }
            });
        }
    </script>
</body>
</html>
