<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Tokens DigiArt</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f0f2f5; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; width: 80px; margin: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #0d47a1; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #002171; }
    </style>
</head>
<body>

<div class="card">
    <h2>Fábrica de Tokens DigiArt</h2>
    <p>Quantos tokens você deseja gerar?</p>
    <input type="number" id="qtd" value="10">
    <br><br>
    <button onclick="gerarTudo()">GERAR E BAIXAR ARQUIVOS</button>
</div>

<script>
function gerarToken() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let res = 's'; // Todos começam com 's' conforme sua preferência
    for (let i = 0; i < 5; i++) {
        res += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return res;
}

function gerarTudo() {
    const quantidade = document.getElementById('qtd').value;
    const tokensFirebase = {};
    const dadosExcel = [];

    for (let i = 1; i <= quantidade; i++) {
        const token = gerarToken();
        const idControle = "MSB-" + Math.floor(1000 + Math.random() * 9000);

        // Estrutura para o Firebase (Sincronizada)
        tokensFirebase[token] = {
            id: idControle,
            status: "disponivel"
        };

        // Estrutura para o Excel
        dadosExcel.push({
            "ID_CONTROLE": idControle,
            "TOKEN": token,
            "STATUS": "disponivel"
        });
    }

    // 1. Baixar JSON para o Firebase
    const blobJson = new Blob([JSON.stringify(tokensFirebase, null, 2)], {type: "application/json"});
    const linkJson = document.createElement("a");
    linkJson.href = URL.createObjectURL(blobJson);
    linkJson.download = "tokens_para_firebase.json";
    linkJson.click();

    // 2. Baixar Excel para você
    const ws = XLSX.utils.json_to_sheet(dadosExcel);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tokens");
    XLSX.writeFile(wb, "lista_clientes_sincronizada.xlsx");
    
    alert("✅ Sucesso! Os dois arquivos foram baixados e estão IGUAIS.");
}
</script>
</body>
</html>
