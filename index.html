<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel DigiArt AR - Gestão</title>
    
    <style>
        /* Estilo Base */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }

        /* CONTAINER RESPONSIVO (O segredo do Lado a Lado) */
        .dashboard-container {
            display: flex;
            flex-wrap: wrap; /* Permite quebrar linha no celular */
            gap: 20px; /* Espaço entre os cards */
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* CARDS (Painéis) */
        .card-sistema {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid #ffd700; /* Dourado DigiArt */
            
            /* No PC: Ocupa quase metade da tela (ajustando o gap) */
            flex: 1 1 450px; 
            min-width: 300px;
            box-sizing: border-box;
        }

        /* Ajustes de Input e Botão */
        .card-sistema h2 { margin-top: 0; font-size: 1.5rem; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .campo-grupo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 8px; 
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-gerar { background-color: #27ae60; color: white; }
        .btn-gerar:hover { background-color: #219150; }
        .btn-renovar { background-color: #2980b9; color: white; }
        .btn-renovar:hover { background-color: #1f6391; }

        /* MEDIA QUERY: Ajustes finos para telas muito pequenas */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card-sistema { padding: 15px; flex: 1 1 100%; }
        }
    </style>
</head>
<body>

    <h1>💎 Painel de Controle DigiArt AR</h1>

    <div class="dashboard-container">
        
        <section class="card-sistema">
            <h2>🆕 Novo Lote</h2>
            <div class="campo-grupo">
                <label>Nome da Pasta (Cliente):</label>
                <input type="text" id="pastaNome" placeholder="ex: cliente-joao">
            </div>
            <div class="campo-grupo">
                <label>Quantidade de Tokens:</label>
                <input type="number" id="qtdTokens" value="50">
            </div>
            <button class="btn-gerar" onclick="gerarTokens()">Gerar Tokens e Sincronizar</button>
        </section>

        <section class="card-sistema">
            <h2>⏳ Renovação</h2>
            <div class="campo-grupo">
                <label>Token do Cliente:</label>
                <input type="text" id="tokenRenovar" placeholder="Digite o token para resetar">
            </div>
            <div class="campo-grupo">
                <label>Nova Validade:</label>
                <input type="text" value="+365 Dias" disabled>
            </div>
            <button class="btn-renovar" onclick="renovarToken()">Renovar Acesso Agora</button>
        </section>

    </div>

    <script>
        // Aqui entra sua configuração do Firebase...
        // Aqui entra a função gerarTokens() com a lógica de SOMA...
        // Aqui entra a função renovarToken()...
    </script>

</body>
</html>
