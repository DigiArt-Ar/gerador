<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão - DigiArt AR</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --azul-escuro: #1A3C5E; 
            --azul-claro: #4F93BF; 
            --dourado: #FFD700; 
            --dourado-escuro: #B8860B; 
            --fundo: #E6F0F5; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--fundo); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        h1 { 
            text-align: center; 
            color: var(--azul-escuro); 
            margin-bottom: 10px; 
            font-size: 2.2rem;
            font-weight: 800;
        }

        .subtitulo {
            text-align: center;
            color: var(--azul-claro);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap; 
            gap: 25px; 
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-sistema {
            background: linear-gradient(135deg, #fff 60%, var(--fundo) 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(26, 60, 94, 0.15); 
            border-top: 8px solid var(--azul-escuro); 
            flex: 1 1 350px; 
            min-width: 310px; 
            box-sizing: border-box;
            transition: transform 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .card-sistema h2 { 
            margin-top: 0; 
            font-size: 1.5rem; 
            color: var(--azul-escuro); 
            border-bottom: 3px solid var(--dourado); 
            padding-bottom: 15px; 
            margin-bottom: 25px;
        }

        .campo-grupo { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95rem; color: var(--azul-escuro); }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #D1E1EB; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background-color: #FBFDFF;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-gerar { background-color: var(--dourado); color: var(--azul-escuro); }
        .btn-renovar { background-color: var(--azul-claro); color: white; }
        .btn-preto { background-color: #000; color: white; }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Resultado QR */
        #resultado-qr {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border: 2px dashed #ccc;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        #display-qr { display: flex; justify-content: center; margin-bottom: 15px; }
        canvas { border: 4px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .btn-down {
            background-color: #27ae60;
            color: white;
            font-size: 0.9rem;
            padding: 12px;
        }

        @media (max-width: 600px) { .card-sistema { flex: 1 1 100%; } }
    </style>
</head>
<body>

    <h1>💎 Painel de Controle DigiArt</h1>
    <p class="subtitulo">Gestão Avançada de Realidade Aumentada</p>

    <div class="dashboard-container">
        
        <section class="card-sistema">
            <h2>🆕 Criar Novo Lote</h2>
            <div class="campo-grupo">
                <label>Nome da Pasta:</label>
                <input type="text" id="pastaNome" placeholder="Ex: nome-do-cliente">
            </div>
            <div class="campo-grupo">
                <label>Qtd Tokens:</label>
                <input type="number" id="qtdTokens" value="50">
            </div>
            <button class="btn-gerar" onclick="gerarTokens()">Gerar e Sincronizar</button>
        </section>

        <section class="card-sistema">
            <h2>⏳ Renovar Acesso</h2>
            <div class="campo-grupo">
                <label>Token Cliente:</label>
                <input type="text" id="tokenRenovar" placeholder="Token aqui">
            </div>
            <div class="campo-grupo">
                <label>Dias:</label>
                <input type="number" id="validadeDias" value="365">
            </div>
            <button class="btn-renovar" onclick="renovarToken()">Confirmar Renovação</button>
        </section>

        <section class="card-sistema">
            <h2>📱 Gerador de QR Code</h2>
            <div class="campo-grupo">
                <label>Link do GitHub Pages:</label>
                <input type="text" id="urlInput" placeholder="https://...">
            </div>
            <button class="btn-preto" onclick="gerarQR()">Gerar QR Code ✨</button>
            
            <div id="resultado-qr">
                <div id="display-qr"></div>
                <button class="btn-down" onclick="baixarPNG()">📥 Baixar Imagem (PNG)</button>
            </div>
        </section>

    </div>

    <script>
        // LÓGICA DO QR CODE
        function gerarQR() {
            const link = document.getElementById("urlInput").value;
            const display = document.getElementById("display-qr");
            const box = document.getElementById("resultado-qr");

            if(!link) { alert("Insira o link!"); return; }

            display.innerHTML = "";
            box.style.display = "block";

            new QRCode(display, {
                text: link,
                width: 180,
                height: 180,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function baixarPNG() {
            const canvas = document.querySelector("#display-qr canvas");
            if(!canvas) return;
            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = "qrcode-digiart.png";
            a.click();
        }

        // --- MANTENHA SUAS FUNÇÕES DO FIREBASE ABAIXO ---
        // (Cole aqui as chaves e as funções gerarTokens() e renovarToken() originais)
        
        function gerarTokens() { 
            console.log("Chamando função original do Firebase...");
            // Sua lógica aqui...
        }

        function renovarToken() { 
            console.log("Chamando função original do Firebase...");
            // Sua lógica aqui...
        }
    </script>
</body>
</html>
