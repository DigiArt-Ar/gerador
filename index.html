<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gestão - DigiArt AR</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-svg@1.1.0/dist/qrcode-svg.min.js"></script>

    <style>
        :root {
            --azul-escuro: #1A3C5E; 
            --azul-claro: #4F93BF; 
            --dourado: #FFD700; 
            --dourado-escuro: #B8860B; 
            --fundo: #E6F0F5; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--fundo); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
        }

        h1 { 
            text-align: center; 
            color: var(--azul-escuro); 
            margin-bottom: 10px; 
            font-size: 2.2rem;
            font-weight: 800;
        }

        .subtitulo {
            text-align: center;
            color: var(--azul-claro);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .dashboard-container {
            display: flex;
            flex-wrap: wrap; 
            gap: 25px; 
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-sistema {
            background: linear-gradient(135deg, #fff 60%, var(--fundo) 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(26, 60, 94, 0.15); 
            border-top: 8px solid var(--azul-escuro); 
            flex: 1 1 380px; 
            min-width: 320px; 
            box-sizing: border-box;
            transition: transform 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        .card-sistema h2 { 
            margin-top: 0; 
            font-size: 1.6rem; 
            color: var(--azul-escuro); 
            border-bottom: 3px solid var(--dourado); 
            padding-bottom: 15px; 
            margin-bottom: 25px;
        }

        .campo-grupo { margin-bottom: 18px; flex-grow: 1; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95rem; color: var(--azul-escuro); }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #D1E1EB; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            transition: 0.2s;
            background-color: #FBFDFF;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gerar { background-color: var(--dourado); color: var(--azul-escuro); }
        .btn-gerar:hover { background-color: var(--dourado-escuro); color: #fff; transform: translateY(-2px); }

        .btn-renovar { background-color: var(--azul-claro); color: white; }
        .btn-renovar:hover { background-color: var(--azul-escuro); transform: translateY(-2px); }

        /* Estilos do NOVO Gerador de QR */
        #resultado-qr {
            margin-top: 25px;
            padding: 20px;
            background: #fafafa;
            border-radius: 15px;
            border: 2px dashed #ccc;
            text-align: center;
            display: none; /* Escondido até gerar */
        }
        
        #qrcode-view { display: flex; justify-content: center; margin-bottom: 20px; }
        /* O Canvas do navegador agora gera em PRETO */
        #qrcode-view canvas { border: 5px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .botoes-download {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-down {
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            color: white;
        }
        
        .btn-down:hover { transform: scale(1.05); }

        @media (max-width: 800px) { .card-sistema { flex: 1 1 100%; } }
    </style>
</head>
<body>

    <h1>💎 Painel de Controle DigiArt</h1>
    <p class="subtitulo">Gestão Avançada de Realidade Aumentada</p>

    <div class="dashboard-container">
        
        <section class="card-sistema">
            <h2>🆕 Criar Novo Lote</h2>
            <div class="campo-grupo">
                <label>Nome da Pasta (Cliente):</label>
                <input type="text" id="pastaNome" placeholder="Ex: nome-do-cliente">
            </div>
            <div class="campo-grupo">
                <label>Quantidade de Tokens:</label>
                <input type="number" id="qtdTokens" value="50" min="1">
            </div>
            <button class="btn-gerar" onclick="gerarTokens()">Gerar Tokens e Sincronizar</button>
        </section>

        <section class="card-sistema">
            <h2>⏳ Renovar Acesso</h2>
            <div class="campo-grupo">
                <label>Token do Cliente:</label>
                <input type="text" id="tokenRenovar" placeholder="Digite o token">
            </div>
            <div class="campo-grupo">
                <label>Dias de Acréscimo:</label>
                <input type="number" id="validadeDias" value="365">
            </div>
            <button class="btn-renovar" onclick="renovarToken()">Confirmar Renovação</button>
        </section>

        <section class="card-sistema">
            <h2>📱 Gerador de QR Code</h2>
            <div class="campo-grupo">
                <label>Link do GitHub Pages:</label>
                <input type="text" id="urlInput" placeholder="https://davidbarcelos.github.io/...">
            </div>
            <button class="btn-gerar" onclick="gerarEVisualizarQR()" style="background-color: var(--azul-escuro); color: white;">Gerar QR Code ✨</button>
            
            <div id="resultado-qr">
                <div id="qrcode-view"></div>
                
                <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Download do QR Code (PRETO PADRÃO):</p>
                <div class="botoes-download">
                    <button class="btn-down" style="background:#444" onclick="downloadSVG()">📥 SVG (Vetor)</button>
                    <button class="btn-down" style="background:#2E7D32" onclick="downloadPNG()">📥 PNG (Imagem)</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        // ...
