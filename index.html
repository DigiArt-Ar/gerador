<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel DigiArt AR - Gestão Total</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --azul-escuro: #1A3C5E; --azul-claro: #4F93BF;
            --dourado: #FFD700; --fundo: #F0F4F7; --sucesso: #27ae60;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--fundo); margin: 0; padding: 20px; color: #333; 
        }

        h1 { text-align: center; color: var(--azul-escuro); font-weight: 800; margin-bottom: 5px; }
        .subtitulo { text-align: center; color: var(--azul-claro); margin-bottom: 30px; font-size: 0.9rem; }

        /* Grid de 3 Colunas */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; max-width: 1300px; margin: 0 auto;
        }

        .card {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-top: 5px solid var(--azul-escuro);
            display: flex; flex-direction: column;
        }

        .card h2 { 
            font-size: 1.2rem; color: var(--azul-escuro); 
            margin-top: 0; border-bottom: 2px solid var(--dourado); 
            padding-bottom: 10px; margin-bottom: 20px;
        }

        .grupo { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        
        input { 
            width: 100%; padding: 12px; border: 1px solid #D1E1EB; 
            border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; 
        }

        button { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            font-weight: 800; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; font-size: 0.9rem;
        }

        .btn-gerar { background: var(--dourado); color: var(--azul-escuro); }
        .btn-renovar { background: var(--azul-claro); color: white; }
        .btn-qr { background: #000; color: white; }
        
        /* Área do QR Code */
        #res-qr { 
            margin-top: 15px; padding: 10px; background: #f9f9f9; 
            border-radius: 10px; display: none; text-align: center; 
        }
        #box-qr { display: flex; justify-content: center; margin-bottom: 10px; }
        .btn-png { background: var(--sucesso); color: white; padding: 8px; font-size: 0.75rem; }

        /* Toast de Status */
        #status {
            position: fixed; bottom: 20px; right: 20px; padding: 15px 25px;
            border-radius: 10px; color: white; font-weight: bold; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="status"></div>

    <h1>💎 Painel DigiArt AR</h1>
    <p class="subtitulo">Controle de Tokens, Renovação e QR Code</p>

    <div class="dashboard">
        
        <section class="card">
            <h2>🆕 Novos Tokens</h2>
            <div class="grupo">
                <label>Nome do Cliente / Pasta:</label>
                <input type="text" id="pastaNome" placeholder="ex: cliente-premium">
            </div>
            <div class="grupo">
                <label>Quantidade:</label>
                <input type="number" id="qtdTokens" value="10">
            </div>
            <button class="btn-gerar" onclick="gerarTokens()">Gerar e Somar no Banco</button>
        </section>

        <section class="card">
            <h2>⏳ Renovar Acesso</h2>
            <div class="grupo">
                <label>Token do Cliente:</label>
                <input type="text" id="tokenRenovar" placeholder="Digite o token">
            </div>
            <div class="grupo">
                <label>Dias de Validade:</label>
                <input type="number" id="validadeDias" value="365">
            </div>
            <button class="btn-renovar" onclick="renovarToken()">Confirmar Renovação</button>
        </section>

        <section class="card">
            <h2>📱 Gerador de QR</h2>
            <div class="grupo">
                <label>Link de Destino:</label>
                <input type="text" id="urlInput" placeholder="Link do seu GitHub Pages">
            </div>
            <button class="btn-qr" onclick="criarQR()">Gerar QR Code ✨</button>
            <div id="res-qr">
                <div id="box-qr"></div>
                <button class="btn-png" onclick="baixarPNG()">📥 BAIXAR PNG</button>
            </div>
        </section>

    </div>

    <script>
        // ---------------------------------------------------------
        // COLE SUAS CHAVES DO FIREBASE AQUI ABAIXO
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_DOMINIO.firebaseapp.com",
            databaseURL: "SUA_URL_DO_BANCO",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_BUCKET.appspot.com",
            messagingSenderId: "SEU_ID",
            appId: "SEU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // FUNÇÃO STATUS (Aviso na tela)
        function showStatus(msg, tipo) {
            const s = document.getElementById('status');
            s.innerText = msg;
            s.style.background = tipo === "success" ? "#27ae60" : "#e74c3c";
            s.style.display = "block";
            setTimeout(() => { s.style.display = "none"; }, 4000);
        }

        // 1. SUA FUNÇÃO ORIGINAL: GERAR TOKENS (MERGE)
        async function gerarTokens() {
            const pasta = document.getElementById('pastaNome').value.trim();
            const qtd = parseInt(document.getElementById('qtdTokens').value);
            if (!pasta) { showStatus("Digite o nome da pasta!", "error"); return; }

            const dbRef = database.ref('tokens');
            const snapshot = await dbRef.once('value');
            let tokensAtuais = snapshot.val() || {};

            for (let i = 0; i < qtd; i++) {
                const novoToken = Math.random().toString(36).substring(2, 8).toUpperCase();
                tokensAtuais[novoToken] = {
                    pasta: pasta,
                    status: "disponivel",
                    data_criacao: new Date().toISOString()
                };
            }

            dbRef.set(tokensAtuais)
                .then(() => showStatus(`${qtd} tokens gerados para ${pasta}!`, "success"))
                .catch((e) => showStatus("Erro: " + e, "error"));
        }

        // 2. SUA FUNÇÃO ORIGINAL: RENOVAR
        function renovarToken() {
            const token = document.getElementById('tokenRenovar').value.trim();
            const dias = parseInt(document.getElementById('validadeDias').value);
            if (!token) { showStatus("Digite o token!", "error"); return; }

            const tokenRef = database.ref(`tokens/${token}`);
            tokenRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    tokenRef.update({
                        status: "disponivel",
                        validade_dias: dias,
                        data_renovacao: new Date().toISOString()
                    }).then(() => showStatus(`Token ${token} renovado por ${dias} dias!`, "success"));
                } else {
                    showStatus("Token não encontrado!", "error");
                }
            });
        }

        // 3. FUNÇÕES DO QR CODE
        function criarQR() {
            const link = document.getElementById("urlInput").value;
            const box = document.getElementById("box-qr");
            if(!link) { showStatus("Insira o link!", "error"); return; }
            box.innerHTML = "";
            document.getElementById("res-qr").style.display = "block";
            new QRCode(box, { text: link, width: 180, height: 180, colorDark: "#000" });
        }

        function baixarPNG() {
            const canvas = document.querySelector("#box-qr canvas");
            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = 'qrcode-digiart.png';
            a.click();
        }
    </script>
</body>
</html>
