<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel DigiArt AR - Gestão Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* Ajuste para ocupar a tela toda sem rolar */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #002171; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            padding: 10px;
            box-sizing: border-box;
        }

        h1.main-title { margin-top: 20px; font-weight: 800; letter-spacing: 2px; }

        /* Mágica do Lado a Lado */
        .dashboard {
            display: flex;
            flex-direction: row; /* Alinha em linha */
            flex-wrap: wrap;    /* Se a tela for pequena (celular), ele pula linha */
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin-top: 20px;
        }

        .card { 
            background: white; 
            color: #333; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            flex: 1;           /* Faz os cards terem o mesmo tamanho */
            min-width: 320px;  /* Largura mínima para não espremer */
            max-width: 400px; 
            box-sizing: border-box;
        }

        h1 { color: #0d47a1; margin-bottom: 5px; font-size: 22px; font-weight: 800; }
        h2 { color: #ffca28; font-size: 11px; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        .campo { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 13px; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; }
        
        .btn-gerar { background: #2e7d32; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-renovar { background: #0288d1; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-qr { background: #000000; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #res-qr { margin-top: 15px; display: none; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        #box-qr { display: flex; justify-content: center; transform: scale(0.9); } /* QR um pouco menor para caber no card */
        
        #status-msg, #status-renova { margin-top: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<h1 class="main-title">💎 PAINEL GESTÃO DIGIART</h1>

<div class="dashboard">
    <div class="card" style="border-top: 5px solid #2e7d32;">
        <h1>GERADOR</h1>
        <h2>Novos Tokens (Soma)</h2>
        <div class="campo">
            <label>Nome do Cliente:</label>
            <input type="text" id="cliente" placeholder="Ex: João Silva">
        </div>
        <div class="campo">
            <label>Quantidade:</label>
            <input type="number" id="qtd" value="1" min="1">
        </div>
        <button class="btn-gerar" onclick="gerarTudoDiretoNoFirebase()">GERAR E SALVAR</button>
        <div id="status-msg"></div>
    </div>

    <div class="card" style="border-top: 5px solid #0288d1;">
        <h1>RENOVAÇÃO</h1>
        <h2>Extender Prazo</h2>
        <div class="campo">
            <label>Token do Cliente:</label>
            <input type="text" id="tokenRenovar" placeholder="Cole o token aqui">
        </div>
        <button class="btn-renovar" onclick="renovarToken()">RENOVAR POR +1 ANO</button>
        <div id="status-renova"></div>
    </div>

    <div class="card" style="border-top: 5px solid #000;">
        <h1>QR CODE</h1>
        <h2>Imagem para Impressão</h2>
        <div class="campo">
            <label>Link do GitHub Pages:</label>
            <input type="text" id="urlInput" placeholder="https://...">
        </div>
        <button class="btn-qr" onclick="criarQR()">GERAR QR CODE</button>
        <div id="res-qr">
            <div id="box-qr"></div>
            <button onclick="baixarPNG()" style="background:#27ae60; color:white; padding:8px; border:none; border-radius:5px; cursor:pointer; font-size:11px; margin-top:5px; width:100%;">📥 BAIXAR PNG</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURAÇÃO ORIGINAL MANTIDA ---
const firebaseConfig = {
    apiKey: "AIzaSyDG-0ErUD35BZTHb9RZ21fFnXcMkX-IlZY",
    authDomain: "digiart-ar-sistema.firebaseapp.com",
    databaseURL: "https://digiart-ar-sistema-default-rtdb.firebaseio.com",
    projectId: "digiart-ar-sistema",
    storageBucket: "digiart-ar-sistema.firebasestorage.app",
    messagingSenderId: "497522538079",
    appId: "1:497522538079:web:6ee88681098324dc28cdea"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- FUNÇÕES MANTIDAS ---
function criarTokenPadrao() {
    const letras = 'abcdefghijklmnopqrstuvwxyz';
    const numeros = '0123456789';
    const l1 = letras.charAt(Math.floor(Math.random() * letras.length));
    const l2 = letras.charAt(Math.floor(Math.random() * letras.length));
    let n = ''; for (let i = 0; i < 4; i++) { n += numeros.charAt(Math.floor(Math.random() * numeros.length)); }
    return (l1 + n + l2).toLowerCase();
}

async function gerarTudoDiretoNoFirebase() {
    const cliente = document.getElementById('cliente').value.trim() || "Geral";
    const qtd = parseInt(document.getElementById('qtd').value);
    const statusMsg = document.getElementById('status-msg');
    const tokensFirebase = {};
    const dadosExcel = [];
    const dataAtual = new Date().toLocaleDateString('pt-BR');

    for (let i = 1; i <= qtd; i++) {
        const oToken = criarTokenPadrao();
        tokensFirebase[oToken] = { cliente: cliente, status: "disponivel", data_geracao: dataAtual };
        dadosExcel.push({ "TOKEN": oToken, "CLIENTE": cliente, "DATA": dataAtual });
    }

    try {
        await database.ref('tokens').update(tokensFirebase);
        const ws = XLSX.utils.json_to_sheet(dadosExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Tokens");
        XLSX.writeFile(wb, "Tokens_" + cliente + ".xlsx");
        statusMsg.style.color = "green";
        statusMsg.innerText = "✅ Salvo com sucesso!";
    } catch (e) { statusMsg.innerText = "❌ Erro"; }
}

async function renovarToken() {
    const token = document.getElementById('tokenRenovar').value.trim().toLowerCase();
    const statusRenova = document.getElementById('status-renova');
    if (!token) return alert("Digite um token!");

    try {
        const ref = database.ref('tokens/' + token);
        const snapshot = await ref.once('value');
        if (snapshot.exists()) {
            await ref.update({
                status: "disponivel",
                data_ativacao: null,
                data_renovacao: new Date().toLocaleDateString('pt-BR')
            });
            statusRenova.style.color = "#0288d1";
            statusRenova.innerText = "🚀 Token renovado!";
            document.getElementById('tokenRenovar').value = "";
        } else {
            statusRenova.style.color = "red";
            statusRenova.innerText = "❌ Não encontrado!";
        }
    } catch (e) { statusRenova.innerText = "⚠️ Erro."; }
}

function criarQR() {
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return alert("Insira o link!");
    const container = document.getElementById('box-qr');
    container.innerHTML = "";
    document.getElementById('res-qr').style.display = "block";
    new QRCode(container, { text: url, width: 180, height: 180, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
}

function baixarPNG() {
    const canvas = document.querySelector("#box-qr canvas");
    if(!canvas) return;
    const link = document.createElement('a');
    link.download = 'qrcode-digiart.png';
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>
</body>
</html>
